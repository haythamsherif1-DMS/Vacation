<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBR Corner</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f4f7f6; }
        #loader-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; position: absolute; width: 100%; z-index: 10; background: #f4f7f6;
        }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #1a73e8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #app-frame { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; z-index: 5; }
        
        /* زر العودة للرئيسية */
        #home-btn {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: #1a73e8; color: white; border: none; padding: 8px 15px;
            border-radius: 20px; font-size: 12px; cursor: pointer; display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <button id="home-btn" onclick="location.reload()">العودة للرئيسية 🏠</button>

    <div id="loader-container">
        <div class="box">
            <img src="icon-192.png" width="80">
            <div class="loader"></div>
            <p>جاري تحميل النظام...</p>
        </div>
    </div>

    <iframe id="app-frame" src=""></iframe>

    <script>
        const googleUrl = "https://script.google.com/macros/s/AKfycbxiKf3j1N1CXD3w1cweDL585vp8BayswdcNtDMkrrISL2KBHdJiZGUCgFiWhjq9t19i/exec";
        
        window.onload = function() {
            const frame = document.getElementById('app-frame');
            const loader = document.getElementById('loader-container');
            const btn = document.getElementById('home-btn');
            
            frame.src = googleUrl;
            frame.onload = function() {
                loader.style.display = 'none';
                frame.style.display = 'block';
                btn.style.display = 'block'; // يظهر الزر بعد تحميل الصفحة
            };
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js', { scope: './' });
        }
    </script>
</body>
</html>
