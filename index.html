<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBR Corner - نظام الإجازات</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; background: #f4f7f6;
            overflow: hidden; /* لمنع التمرير المزدوج */
        }
        
        /* شاشة التحميل */
        #loader-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
        }
        .box { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 85%; width: 350px;
        }
        .loader { 
            border: 5px solid #f3f3f3; border-top: 5px solid #1a73e8; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s linear infinite; margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* إطار المنصة */
        #app-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: none;
        }

        /* بنر التحديث */
        #update-banner {
            display: none; position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); background: #323232; color: white;
            padding: 15px 25px; border-radius: 30px; z-index: 10000; font-size: 14px;
        }
        #update-banner button {
            background: #1a73e8; border: none; color: white;
            padding: 5px 12px; margin-right: 10px; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="box">
            <img src="icon-192.png" alt="Logo" style="width: 80px; margin-bottom: 10px;">
            <h2 style="color: #1a73e8;">BBR Corner</h2>
            <div class="loader"></div>
            <p>جاري تشغيل المنصة...</p>
        </div>
    </div>

    <iframe id="app-frame" src=""></iframe>

    <div id="update-banner">
        يتوفر تحديث جديد 
        <button onclick="window.location.reload(true)">تحديث الآن</button>
    </div>

    <script>
        const googleUrl = "https://script.google.com/macros/s/AKfycby05bSVLNJ9JLbyV6qF7U3Y3cnxETbSblf8w87EOdaS4YlrT_9lCKMQaMBzmkp8nYqB/exec";
        
        window.onload = function() {
            const frame = document.getElementById('app-frame');
            const loader = document.getElementById('loader-container');
            
            // تحميل الرابط داخل الإطار
            frame.src = googleUrl;
            
            frame.onload = function() {
                loader.style.display = 'none';
                frame.style.display = 'block';
            };
        };

        // تسجيل الـ Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            document.getElementById('update-banner').style.display = 'block';
                        }
                    };
                };
            });
        }
    </script>
</body>
</html>
